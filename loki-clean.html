<script type="text/html" data-help-name="loki-clean">
    <p>Removes all Grafana Loki related properties from a message before passing
    it on. Wire this after any loki node when you want to continue the flow
    without carrying loki metadata forward.</p>

    <h3>What gets removed</h3>
    <p>Any property whose name starts with <code>loki</code>, plus
    <code>count</code> which is set by batch/lines output modes. Since all loki
    node output properties use the <code>loki</code> prefix this covers
    everything:</p>
    <ul>
        <li><code>lokiOptions</code> — runtime options object</li>
        <li><code>lokiRaw</code> — raw Loki API response</li>
        <li><code>lokiResultType</code> — Loki result type string</li>
        <li><code>lokiEntry</code> — full entry object in each mode</li>
        <li><code>lokiTimestamp</code> — nanosecond log timestamp string</li>
        <li><code>lokiLabels</code> — stream labels object</li>
        <li><code>lokiReady</code> — health check boolean</li>
        <li><code>lokiStatus</code> — health check status string</li>
        <li><code>lokiBuildInfo</code> — Loki version/build info</li>
        <li><code>lokiLabelValues</code> — label values map</li>
        <li><code>count</code> — line count from batch output modes</li>
    </ul>

    <h3>What is preserved</h3>
    <p><code>msg.payload</code>, <code>msg.topic</code>, <code>msg._msgid</code>,
    and all other non-loki properties pass through untouched.</p>

    <h3>Status</h3>
    <p>Shows the number of properties removed on each message, or
    "nothing to clean" if the message had no loki properties.</p>

    <h3>Typical use</h3>
    <pre>[loki-query] → [your processing nodes] → [loki-clean] → [next stage]</pre>
    <pre>[Change: set msg.lokiOptions] → [loki-query] → [loki-clean] → [continue]</pre>
</script>
